<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>René Castillo | Marine Geology</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; color: white; overflow-x: hidden; background: #050a14; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: brightness(.35); }
        .page-overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(5,10,20,.35), rgba(5,10,20,.75)); z-index: -1; }
        .container { position: relative; z-index: 1; max-width: 1100px; margin: auto; padding: 40px; }
        header { text-align: center; margin-bottom: 60px; }
        .card { background: rgba(0,0,0,.45); padding: 30px; border-radius: 18px; margin-bottom: 30px; backdrop-filter: blur(10px); }
        .profile { display: flex; flex-wrap: wrap; align-items: center; gap: 28px; }
        .profile img { width: 180px; height: 180px; object-fit: cover; object-position: center 35%; border-radius: 50%; border: 4px solid rgba(255,255,255,.9); flex-shrink: 0; box-shadow: 0 0 25px rgba(0,0,0,.5); }
        .profile-text { flex: 1; min-width: 260px; }
        .links a { margin-right: 16px; color: #8fe8ff; text-decoration: none; font-weight: 600; padding: 8px 16px; border: 1px solid rgba(255,255,255,.2); border-radius: 25px; }
        .field-container { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; align-items: center; }
        #globe { width: 100%; height: 500px; }
        .trench-panel { background: rgba(255,255,255,.08); padding: 15px; border-radius: 12px; }
        .trench-panel iframe { width: 100%; height: 420px; border: none; border-radius: 8px; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }
        .lightbox iframe { width: 90%; height: 90%; margin: 5% auto; display: block; border: none; }
        .lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="ocean.mp4" type="video/mp4">
    </video>
    <div class="page-overlay"></div>

    <div class="container">
        <header>
            <h1>René Castillo</h1>
            <p>PhD Candidate | Marine Geology | Geohazards | Sediment Transport</p>
        </header>

        <section class="card profile">
            <img src="profile.jpg" alt="René Castillo">
            <div class="profile-text">
                <h2>About</h2>
                <p>I am a PhD candidate in Earth Sciences at The Ohio State University studying submarine landslides, sediment transport, and marine geohazards.</p>
                <div class="links">
                    <a href="https://github.com/rocknrene" target="_blank">GitHub</a>
                    <a href="https://scholar.google.com/citations?hl=en&user=i3UMLBMAAAAJ" target="_blank">Google Scholar</a>
                    <a href="https://orcid.org/0009-0006-1897-0000" target="_blank">ORCID</a>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Field Sites</h2>
            <div class="field-container">
                <div id="globe"></div>
                <div class="trench-panel">
                    <h3>Japan Trench System</h3>
                    <iframe src="trench-diagram.pdf"></iframe>
                </div>
            </div>
        </section>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById("globe");
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / 500, 0.1, 1000);
            camera.position.z = 3;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, 500);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);
            
            const earth = new THREE.Mesh(
                new THREE.SphereGeometry(1.15, 64, 64),
                new THREE.MeshPhongMaterial({ map: new THREE.TextureLoader().load('https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57730/gebco_bathymetry_2048.jpg') })
            );
            scene.add(earth);
            earth.rotation.y = Math.PI;

            function animate() {
                requestAnimationFrame(animate);
                earth.rotation.y += 0.00035;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                renderer.setSize(container.clientWidth, 500);
                camera.aspect = container.clientWidth / 500;
                camera.updateProjectionMatrix();
            });
        });
    </script>
</body>
</html>
