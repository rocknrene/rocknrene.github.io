<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>René Castillo | Marine Geology</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family:'Inter',sans-serif; margin:0; color:white; overflow-x:hidden; background: #050a14; }
        .container { position:relative; z-index:1; max-width:1100px; margin:auto; padding:40px; }
        .card { background:rgba(0,0,0,.45); padding:30px; border-radius:18px; margin-bottom:30px; backdrop-filter:blur(10px); }
        .field-container { display:grid; grid-template-columns:1.5fr 1fr; gap:30px; align-items:center; }
        #globe-wrapper { position: relative; width: 100%; }
        #globe { width:100%; height:400px; background:transparent; }
        #location-label { text-align: center; font-weight: 600; color: #8fe8ff; margin-top: 10px; height: 20px; }
        .trench-panel img { width:100%; height:400px; object-fit:cover; border-radius:12px; }
    </style>
</head>
<body>

<div class="container">
    <section class="card">
        <h2>Field Sites & Research</h2>
        <div class="field-container">
            <div id="globe-wrapper">
                <div id="globe"></div>
                <div id="location-label">Rotating...</div>
            </div>
            <div class="trench-panel">
                <img src="trench.png" alt="Japan Trench Diagram">
            </div>
        </div>
    </section>
</div>

<script>
    window.onload = () => {
        const container = document.getElementById('globe');
        const label = document.getElementById('location-label');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.z = 2.2;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const globe = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshBasicMaterial({ color: 0x4488ff, wireframe: true, transparent: true, opacity: 0.3 }));
        scene.add(globe);

        const sites = [
            { name: "La Push, WA", lat: 48.0, lon: -124.6 },
            { name: "Sendai, Japan", lat: 38.3, lon: 143.6 },
            { name: "Navajo Nation", lat: 36.1, lon: -109.5 }
        ];

        const markers = sites.map(site => {
            const m = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshBasicMaterial({ color: 0xff4d4d }));
            const phi = (90 - site.lat) * (Math.PI / 180);
            const theta = (site.lon + 180) * (Math.PI / 180);
            m.position.set(-Math.sin(phi) * Math.cos(theta), Math.cos(phi), Math.sin(phi) * Math.sin(theta));
            m.userData = { name: site.name };
            globe.add(m);
            return m;
        });

        let t = 0;
        function animate() {
            requestAnimationFrame(animate);
            t += 0.05;
            globe.rotation.y += 0.005;

            // Find which marker is closest to the front (Z > 0.8)
            let found = "Research Sites";
            markers.forEach(m => {
                const vector = m.position.clone().applyMatrix4(globe.matrixWorld);
                if (vector.z > 0.8) found = m.userData.name;
                const s = 1 + Math.sin(t) * 0.4; 
                m.scale.set(s, s, s);
            });
            label.innerText = found;

            renderer.render(scene, camera);
        }
        animate();
    };
</script>

</body>
</html>
