<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>René Castillo | Marine Geology</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family:'Inter',sans-serif; margin:0; color:white; background: #050a14; }
        .container { max-width:1100px; margin:auto; padding:40px; }
        .card { background:rgba(0,0,0,.45); padding:30px; border-radius:18px; margin-bottom:30px; backdrop-filter:blur(10px); }
        .profile { display:flex; align-items:center; gap:28px; }
        .profile img { width:180px; height:180px; border-radius:50%; border:4px solid white; object-fit:cover; }
        .field-container { display:grid; grid-template-columns: 1fr 1fr; gap:30px; }
        #globe { width:100%; height:400px; background: #000; border-radius: 12px; overflow: hidden; }
        .trench-panel img { width:100%; height:400px; object-fit:cover; border-radius:12px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>René Castillo</h1></header>

    <section class="card profile">
        <img src="profile.jpg" alt="René Castillo">
        <div>
            <h2>About</h2>
            <p>PhD Candidate | Marine Geology | Geohazards</p>
        </div>
    </section>

    <section class="card">
        <h2>Field Sites & Research</h2>
        <div class="field-container">
            <div id="globe"></div>
            <div class="trench-panel">
                <img src="trench.png" alt="Japan Trench Diagram">
            </div>
        </div>
    </section>
</div>

<script>
window.onload = () => {
    const container = document.getElementById('globe');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
    camera.position.z = 2.5;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(1, 32, 32);
    // Note: If this remains black, download this image and save as 'earth.jpg' locally
    const texture = new THREE.TextureLoader().load('https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57730/gebco_bathymetry_2048.jpg');
    const material = new THREE.MeshPhongMaterial({ map: texture });
    const earth = new THREE.Mesh(geometry, material);
    scene.add(earth);

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 3, 5);
    scene.add(light);

    // Marker Function
    function addMarker(lat, lon) {
        const marker = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        marker.position.x = -Math.sin(phi) * Math.cos(theta);
        marker.position.z = Math.sin(phi) * Math.sin(theta);
        marker.position.y = Math.cos(phi);
        earth.add(marker);
    }

    // Your Sites
    addMarker(48.0, -124.6);  // La Push
    addMarker(38.3, 143.6);   // Sendai Japan
    addMarker(36.1, -109.5);  // Navajo Nation

    function animate() {
        requestAnimationFrame(animate);
        earth.rotation.y += 0.002;
        renderer.render(scene, camera);
    }
    animate();
};
</script>
</body>
</html>
